<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Seguimiento de Viaje - Sitios Hidalgo</title>
  <meta name="description" content="Sigue tu viaje de taxi en tiempo real">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0A0A0A;
      --bg2: #12121e;
      --card: #1a1a2e;
      --border: #2a2a4a;
      --accent: #00c9ff;
      --accent2: #00ff88;
      --danger: #ff4757;
      --text: #e8e8f0;
      --text2: #8888aa;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── MAPA ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
      filter: invert(0.85) hue-rotate(200deg) saturate(0.8) brightness(0.7);
    }

    /* ── HEADER ── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 100%;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, #00c9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      color: #00ff88;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── INFO PANEL ── */
    .info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px;
      max-height: 35vh;
      overflow-y: auto;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-value {
      font-family: 'Rajdhani', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .info-value.name {
      color: var(--accent2);
    }

    /* ── DISTANCIA ── */
    .distance-section {
      background: rgba(0, 201, 255, 0.1);
      border: 1px solid rgba(0, 201, 255, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    .distance-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'Rajdhani', monospace;
    }

    .distance-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* ── BOTONES ── */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-action {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }

    .btn-whatsapp:hover {
      background: #20ba58;
    }

    .btn-copy {
      background: rgba(0, 201, 255, 0.2);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-copy:hover {
      background: rgba(0, 201, 255, 0.3);
    }

    /* ── LOADING ── */
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.9);
      z-index: 200;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 201, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── ERROR ── */
    .error-panel {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 200;
      padding: 20px;
      text-align: center;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .error-text {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 24px;
    }

    .reconnect-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header-info {
        flex-direction: column;
        gap: 4px;
      }

      .info-panel {
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="header">
    <div class="header-content">
      <div class="header-title">📍 Seguimiento de Viaje</div>
      <div class="header-info">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span id="status-text">Conectando...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="info-panel">
    <div class="distance-section">
      <div class="distance-value" id="distance-value">--</div>
      <div class="distance-label">Distancia desde tu ubicación</div>
    </div>

    <div class="info-row">
      <span class="info-label">👤 Pasajero</span>
      <span class="info-value name" id="info-usuario">--</span>
    </div>

    <div class="info-row">
      <span class="info-label">📞 Teléfono</span>
      <span class="info-value" id="info-telefono">--</span>
    </div>

    <div class="info-row">
      <span class="info-label">🚖 Unidad</span>
      <span class="info-value" id="info-unidad">--</span>
    </div>

    <div class="info-row">
      <span class="info-label">🎯 Destino</span>
      <span class="info-value" id="info-destino">--</span>
    </div>

    <div class="info-row">
      <span class="info-label">⏱️ Hora actual</span>
      <span class="info-value" id="info-time">--:--</span>
    </div>

    <div class="btn-group">
      <button class="btn-action btn-whatsapp" onclick="window.abrirWhatsApp?.()">
        💬 Contactar por WhatsApp
      </button>
      <button class="btn-action btn-copy" onclick="window.copiarUbicacion?.()">
        📍 Copiar ubicación
      </button>
    </div>
  </div>

  <div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
  </div>

  <div id="error" class="error-panel" style="display:none;">
    <div class="error-icon">❌</div>
    <div class="error-title">Viaje no encontrado</div>
    <div class="error-text" id="error-msg">El enlace puede haber expirado o ser inválido</div>
    <button class="reconnect-btn" onclick="location.reload()">Reintentar</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
  
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ──────────────────────────────────────────────
    // CONFIGURACIÓN FIREBASE
    // ──────────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDEu6dOk9mUqXp52lyY6vBEm4GAsgU0ESU",
      authDomain: "sitios-hidalgo-gps.firebaseapp.com",
      databaseURL: "https://sitios-hidalgo-gps-default-rtdb.firebaseio.com",
      projectId: "sitios-hidalgo-gps",
      storageBucket: "sitios-hidalgo-gps.firebasestorage.app",
      messagingSenderId: "140903781731",
      appId: "1:140903781731:web:2178219a57a3244db42f56"
    };

    const fapp = window.firebase.initializeApp(FIREBASE_CONFIG);
    const db = window.firebase.database(fapp);

    // ──────────────────────────────────────────────
    // ESTADO GLOBAL
    // ──────────────────────────────────────────────
    let map          = null;
    let userMarker   = null;
    let taxiMarker   = null;
    let viajeData    = null;
    let trackingRef  = null;
    let userLocation = { lat: null, lng: null };
    let userWatchId  = null;   // ID del watchPosition para poder cancelarlo
    let clockInterval = null;  // ID del setInterval del reloj

    // ──────────────────────────────────────────────
    // INICIALIZACIÓN
    // ──────────────────────────────────────────────
    function init() {
      const params = new URLSearchParams(window.location.search);
      const viajeId = params.get("id");

      if (!viajeId) {
        mostrarError("ID de viaje no encontrado en la URL");
        return;
      }

      // Inicializar mapa
      initMap();

      // Obtener ubicación del usuario (guardamos ID para limpiar al salir)
      if (navigator.geolocation) {
        userWatchId = navigator.geolocation.watchPosition(
          (pos) => {
            userLocation.lat = pos.coords.latitude;
            userLocation.lng = pos.coords.longitude;
            actualizarMarcadorUsuario();
            document.getElementById("status-text").textContent = "En línea";
          },
          (err) => console.warn("Error obteniendo GPS:", err),
          { enableHighAccuracy: true, maximumAge: 5000 }
        );
      }

      // Escuchar datos del viaje
      escucharViaje(viajeId);

      // Actualizar hora (guardamos ID para limpiar al salir)
      clockInterval = setInterval(() => {
        document.getElementById("info-time").textContent =
          new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
      }, 1000);
    }

    // Limpiar todos los recursos al salir de la página
    window.addEventListener("pagehide", () => {
      if (trackingRef)  { trackingRef.off(); trackingRef = null; }
      if (userWatchId !== null) { navigator.geolocation.clearWatch(userWatchId); userWatchId = null; }
      if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
    });

    // ──────────────────────────────────────────────
    // MAPA LEAFLET
    // ──────────────────────────────────────────────
    function initMap() {
      map = L.map("map", {
        center: [17.4575, -97.2273],
        zoom: 14,
        zoomControl: false,
        attributionControl: false
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
      }).addTo(map);

      // Marcador taxi (se actualizará)
      taxiMarker = L.marker([17.4575, -97.2273], {
        icon: L.divIcon({
          html: `<div style="
            width:32px; height:32px; border-radius:50%;
            background:#ff6b00; color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; border:2px solid #fff;
            box-shadow:0 2px 8px rgba(0,0,0,0.3);
          ">🚕</div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        })
      }).addTo(map);

      setTimeout(() => map.invalidateSize(), 100);
    }

    // ──────────────────────────────────────────────
    // ACTUALIZAR MARCADOR USUARIO
    // ──────────────────────────────────────────────
    function actualizarMarcadorUsuario() {
      if (!userLocation.lat || !map) return;

      if (!userMarker) {
        userMarker = L.marker([userLocation.lat, userLocation.lng], {
          icon: L.divIcon({
            html: `<div style="
              width:24px; height:24px; border-radius:50%;
              background:#00c9ff; color:#fff;
              display:flex; align-items:center; justify-content:center;
              font-size:14px; border:2px solid #fff;
              box-shadow:0 0 0 8px rgba(0,201,255,0.2);
            ">📍</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          })
        }).addTo(map);
      } else {
        userMarker.setLatLng([userLocation.lat, userLocation.lng]);
      }

      calcularDistancia();
    }

    // ──────────────────────────────────────────────
    // ESCUCHAR DATOS DEL VIAJE
    // ──────────────────────────────────────────────
    function escucharViaje(viajeId) {
      document.getElementById("loading").style.display = "flex";

      trackingRef = window.firebase
        .database()
        .ref(`viajes_compartidos/${viajeId}`);

      trackingRef.on("value", (snap) => {
        const data = snap.val();

        if (!data || !data.activo) {
          mostrarError("El viaje ha finalizado o no está disponible");
          return;
        }

        viajeData = data;
        
        // Actualizar info
        document.getElementById("info-usuario").textContent = data.usuario || "--";
        document.getElementById("info-telefono").textContent = data.telefono || "--";
        document.getElementById("info-unidad").textContent = data.nroUnidad || "--";
        document.getElementById("info-destino").textContent = data.destino || "--";

        // Actualizar marcador taxi
        if (data.ubicacionActual) {
          const { lat, lng } = data.ubicacionActual;
          if (lat && lng) {
            taxiMarker.setLatLng([lat, lng]);
            calcularDistancia();

            // Centrar mapa si es la primera vez
            if (!snap._prev || snap._prev.val()?.ubicacionActual?.lat === undefined) {
              map.setView([lat, lng], 15);
            }
          }
        }

        document.getElementById("loading").style.display = "none";
      });

      trackingRef.on("error", (err) => {
        mostrarError(`Error: ${err.message}`);
      });
    }

    // ──────────────────────────────────────────────
    // CALCULAR DISTANCIA
    // ──────────────────────────────────────────────
    function calcularDistancia() {
      if (!userLocation.lat || !viajeData?.ubicacionActual) return;

      const { lat: lat1, lng: lng1 } = userLocation;
      const { lat: lat2, lng: lng2 } = viajeData.ubicacionActual;

      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const distanceKm = R * c;

      const distanceM = Math.round(distanceKm * 1000);
      document.getElementById("distance-value").textContent = 
        distanceM < 1000 ? `${distanceM}m` : `${(distanceKm).toFixed(1)}km`;
    }

    // ──────────────────────────────────────────────
    // FUNCIONES DE COMPARTIR
    // ──────────────────────────────────────────────
    window.abrirWhatsApp = function() {
      if (!viajeData) return;
      const msg = `Hola ${viajeData.usuario}, ¿Cuál es tu ETA? 📍`;
      const url = `https://wa.me/${viajeData.telefono.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`;
      window.open(url, "_blank");
    };

    window.copiarUbicacion = function() {
      if (!viajeData?.ubicacionActual) return;
      const { lat, lng } = viajeData.ubicacionActual;
      const texto = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      navigator.clipboard?.writeText(texto).then(() => {
        alert("✅ Coordenadas copiadas al portapapeles");
      });
    };

    // ──────────────────────────────────────────────
    // ERROR
    // ──────────────────────────────────────────────
    function mostrarError(mensaje) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display = "flex";
      document.getElementById("error-msg").textContent = mensaje;
    }

    // Iniciar
    window.addEventListener("load", init);
  </script>
</body>
</html>
