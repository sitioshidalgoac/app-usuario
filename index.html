<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHidalgo Kué'in</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body,html{height:100%;font-family:'Segoe UI',sans-serif;overflow:hidden;background:#1a237e;}
#splash{position:fixed;inset:0;background:#1a237e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 1s;}
#splash h1{color:#FFD700;font-size:28px;font-weight:900;letter-spacing:3px;margin-top:20px;text-align:center;}
#splash p{color:rgba(255,255,255,0.8);font-size:12px;letter-spacing:4px;margin-top:8px;}
#splash .copy{position:absolute;bottom:30px;color:rgba(255,255,255,0.4);font-size:11px;}
#app{display:none;flex-direction:column;height:100vh;}
header{background:#1a237e;color:#fff;padding:12px 15px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #FFD700;flex-shrink:0;}
header span{font-weight:bold;font-size:14px;flex:1;}
#taxi-count{background:#FFD700;color:#1a237e;padding:3px 8px;border-radius:10px;font-size:12px;font-weight:bold;}
.menu-btn{background:none;border:none;color:#FFD700;font-size:22px;cursor:pointer;}
#map{flex:1;width:100%;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:15px;display:flex;gap:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));}
.btn-pedir{flex:1;background:#1a237e;color:#fff;border:2px solid #FFD700;border-radius:16px;padding:20px;font-size:18px;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
.btn-sos{width:85px;background:#d32f2f;color:#fff;border:none;border-radius:16px;padding:20px;font-size:13px;font-weight:bold;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
#menu{position:fixed;top:0;left:-290px;width:280px;height:100%;background:#1a237e;z-index:2000;transition:left 0.3s;border-right:2px solid #FFD700;display:flex;flex-direction:column;}
#menu.open{left:0;}
.menu-header{padding:40px 20px 20px;text-align:center;border-bottom:1px solid #FFD700;}
.menu-header h2{color:#FFD700;margin-top:15px;font-size:18px;}
.menu-header p{color:rgba(255,255,255,0.6);font-size:11px;margin-top:4px;}
.menu-item{padding:18px 25px;color:#fff;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:15px;cursor:pointer;}
.menu-item i{color:#FFD700;width:20px;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1999;}
#overlay.show{display:block;}
#modal-buscando{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:3000;align-items:center;justify-content:center;}
#modal-buscando.show{display:flex;}
.modal-box{background:#1a237e;border:2px solid #FFD700;border-radius:20px;padding:40px;text-align:center;width:85%;}
.modal-box h2{color:#FFD700;margin-bottom:10px;}
.modal-box p{color:#fff;font-size:13px;margin-top:10px;}
.spinner{width:60px;height:60px;border:4px solid rgba(255,215,0,0.3);border-top:4px solid #FFD700;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.btn-cancelar{margin-top:20px;background:#d32f2f;color:#fff;border:none;border-radius:10px;padding:14px 30px;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>
<div id="splash">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
    <circle cx="100" cy="100" r="98" fill="#DAA520"/>
    <circle cx="100" cy="100" r="86" fill="#1a237e"/>
    <text x="100" y="58" text-anchor="middle" fill="#FFD700" font-size="12" font-weight="bold" font-family="Arial">SITIOS HIDALGO A.C.</text>
    <text x="100" y="78" text-anchor="middle" fill="#FFD700" font-size="9" font-family="Arial">★ ★ ★ ★ ★</text>
    <text x="100" y="118" text-anchor="middle" fill="#FFD700" font-size="48">🚕</text>
    <text x="100" y="145" text-anchor="middle" fill="#FFD700" font-size="9" font-family="Arial">NOCHIXTLÁN, OAXACA</text>
    <text x="100" y="163" text-anchor="middle" fill="rgba(255,215,0,0.7)" font-size="8" font-family="Arial">Tradición y Seguridad</text>
  </svg>
  <h1>SITIO HIDALGO</h1>
  <p>TRADICIÓN Y SEGURIDAD</p>
  <span class="copy">© SITIO HIDALGO 2026</span>
</div>
<div id="app">
  <header>
    <button class="menu-btn" onclick="abrirMenu()"><i class="fas fa-bars"></i></button>
    <span>NOCHIXTLÁN, OAXACA</span>
    <span id="taxi-count">🚕 0</span>
  </header>
  <div id="map"></div>
  <div class="bottom-bar">
    <button class="btn-pedir" onclick="pedirTaxi()"><i class="fas fa-taxi"></i> SOLICITAR VIAJE</button>
    <button class="btn-sos" onclick="activarSOS()"><i class="fas fa-shield-alt" style="font-size:20px"></i> SOS</button>
  </div>
</div>
<div id="overlay" onclick="cerrarMenu()"></div>
<div id="menu">
  <div class="menu-header">
    <svg viewBox="0 0 200 200" width="80" height="80">
      <circle cx="100" cy="100" r="98" fill="#DAA520"/>
      <circle cx="100" cy="100" r="86" fill="#1a237e"/>
      <text x="100" y="118" text-anchor="middle" fill="#FFD700" font-size="80">🚕</text>
    </svg>
    <h2>SITIO HIDALGO</h2>
    <p>Tradición y Seguridad</p>
  </div>
  <div class="menu-item"><i class="fas fa-user"></i> Perfil</div>
  <div class="menu-item"><i class="fas fa-history"></i> Mis Viajes</div>
  <div class="menu-item"><i class="fas fa-cog"></i> Configuración</div>
  <div class="menu-item"><i class="fas fa-phone"></i> Contacto</div>
  <div class="menu-item"><i class="fas fa-info-circle"></i> Nosotros</div>
  <div class="menu-item" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</div>
</div>
<div id="modal-buscando">
  <div class="modal-box">
    <h2>🚕 Buscando taxi...</h2>
    <div class="spinner"></div>
    <p>Conectando con conductores disponibles</p>
    <button class="btn-cancelar" onclick="cancelarBusqueda()">Cancelar</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map, marcadores={}, unsubViaje=null;

// SPLASH - usa setTimeout simple, sin depender de load
setTimeout(function(){
  var s=document.getElementById('splash');
  var a=document.getElementById('app');
  s.style.opacity='0';
  setTimeout(function(){
    s.style.display='none';
    a.style.display='flex';
    iniciarMapa();
    iniciarFirebase();
  },800);
},3000);

function iniciarMapa(){
  try{
    map=L.map('map',{zoomControl:false,attributionControl:false}).setView([17.4575,-97.2273],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({position:'topright'}).addTo(map);
  }catch(e){console.log('Mapa error:',e);}
}

function iniciarFirebase(){
  try{
    var cfg={apiKey:"AIzaSyDEu6dOk9mUqXp52lyY6vBEm4GAsgU0ESU",authDomain:"sitios-hidalgo-gps.firebaseapp.com",databaseURL:"https://sitios-hidalgo-gps-default-rtdb.firebaseio.com",projectId:"sitios-hidalgo-gps",storageBucket:"sitios-hidalgo-gps.appspot.com",messagingSenderId:"140903781731"};
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    escucharTaxis();
  }catch(e){console.log('Firebase error:',e);}
}

function iconoTaxi(){
  return L.divIcon({className:'',html:'<div style="font-size:26px">🚕</div>',iconSize:[35,35],iconAnchor:[17,17]});
}

function escucharTaxis(){
  try{
    firebase.database().ref('conductores').on('value',function(snap){
      var data=snap.val()||{};
      var count=0;
      Object.keys(marcadores).forEach(function(id){if(!data[id]){map.removeLayer(marcadores[id]);delete marcadores[id];}});
      Object.entries(data).forEach(function(e){
        var id=e[0],c=e[1];
        if(!c.lat||!c.lng)return;
        count++;
        if(marcadores[id])marcadores[id].setLatLng([c.lat,c.lng]);
        else marcadores[id]=L.marker([c.lat,c.lng],{icon:iconoTaxi()}).bindPopup('<b>'+id+'</b>').addTo(map);
      });
      var el=document.getElementById('taxi-count');
      if(el)el.textContent='🚕 '+count;
    });
  }catch(e){console.log('Taxis error:',e);}
}

function pedirTaxi(){
  document.getElementById('modal-buscando').classList.add('show');
  navigator.geolocation.getCurrentPosition(function(pos){
    try{
      firebase.firestore().collection('solicitudes').add({lat:pos.coords.latitude,lng:pos.coords.longitude,estado:'pendiente',timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){}
  },function(){alert('Activa tu GPS');});
}

function cancelarBusqueda(){
  document.getElementById('modal-buscando').classList.remove('show');
}

function activarSOS(){
  if(confirm('¿Activar alerta SOS?')){
    try{
      navigator.geolocation.getCurrentPosition(function(pos){
        firebase.firestore().collection('sos').add({lat:pos.coords.latitude,lng:pos.coords.longitude,timestamp:firebase.firestore.FieldValue.serverTimestamp(),activo:true});
      });
    }catch(e){}
    alert('🆘 SOS enviado.');
  }
}

function abrirMenu(){document.getElementById('menu').classList.add('open');document.getElementById('overlay').classList.add('show');}
function cerrarMenu(){document.getElementById('menu').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
function cerrarSesion(){location.reload();}
</script>
</body>
</html>
